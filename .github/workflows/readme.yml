name: Readme Auto-Update

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  check-readme:
    name: Verify README is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML
          
      - name: Generate README
        run: python scripts/generate_readme.py --output README.md
      
      - name: Check if README changed
        run: |
          if git diff --quiet README.md; then
            echo "README.md is up to date"
          else
            echo "README.md needs updating!"
            echo "Run: python scripts/generate_readme.py"
            git diff README.md
            exit 1
          fi

  auto-update-readme:
    name: Auto-update README on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: check-readme
    if: failure()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML
          
      - name: Update README
        run: |
          python scripts/generate_readme.py --output README.md
          
      - name: Commit updated README
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: auto-update README from project structure" || echo "No changes"
          git push || echo "Could not push"
