<!-- Report Submission Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodGuard - Report Submission</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Submit a Flood Report</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="alerts.html">Alerts</a>
            <a href="routing.html">Safe Routing</a>
            <a href="authority.html">Authority Panel</a>
            <a href="auth.html">Login/Register</a>
        </nav>
    </header>
    <main>
        <form id="report-form">
            <label>Location (auto-filled): <input type="text" id="location" readonly></label><br>
            <label>Severity:
                <select id="severity">
                    <option value="low">Low</option>
                    <option value="moderate">Moderate</option>
                    <option value="high">High</option>
                </select>
            </label><br>
            <label>Image: <input type="file" id="image"></label><br>
            <button type="submit">Submit Report</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 FloodGuard</p>
    </footer>
    <script type="module" src="../js/report.js"></script>
</body>
</html>
