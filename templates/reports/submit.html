{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section report-page">
    <div class="container">
        <div class="section-header narrow">
            <h1 class="section-title">Submit Flood Incident Report</h1>
            <p class="section-subtitle">Send location, severity, and field notes to the response team.</p>
        </div>

        <form id="report-form" action="/api/v1/reports/" method="post" enctype="multipart/form-data" class="report-form card">
            {% csrf_token %}
            <div class="form-group">
                <label for="description">What are you seeing?</label>
                <textarea id="description" name="description" rows="4" placeholder="Water depth, affected road, nearby landmark..." required></textarea>
            </div>

            <div class="form-group">
                <label for="severity">Severity</label>
                <div class="severity-control">
                    <input type="range" id="severity" name="severity" min="1" max="5" value="3">
                    <strong id="severity-value">3</strong>
                </div>
            </div>

            <div class="form-group">
                <label for="water-depth">Estimated water depth (cm)</label>
                <input type="number" id="water-depth" name="water_depth_cm" min="0" max="500" value="45">
            </div>

            <div class="form-group">
                <label>Location</label>
                <button type="button" id="use-current-location" class="btn btn-primary btn-block">
                    <span class="gps-label">Use Current Location</span>
                </button>
                <div id="location-status" class="location-status">
                    <span id="location-icon">•</span>
                    <span id="location-text">Location not set</span>
                </div>
            </div>

            <div class="location-grid">
                <div class="form-group">
                    <label for="latitude">Latitude</label>
                    <input type="number" id="latitude" name="latitude" step="0.000001" required>
                </div>
                <div class="form-group">
                    <label for="longitude">Longitude</label>
                    <input type="number" id="longitude" name="longitude" step="0.000001" required>
                </div>
            </div>

            <div class="form-group">
                <label for="photo">Photo</label>
                <label class="upload-zone" for="photo">
                    <input type="file" id="photo" name="photo" accept="image/*">
                    <span id="photo-label">Drop or choose an image</span>
                    <img id="photo-preview" alt="" hidden>
                </label>
            </div>

            <div id="form-errors" class="form-errors" aria-live="polite"></div>

            <button type="submit" id="submit-btn" class="btn btn-accent btn-block">Submit Report</button>
        </form>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/report.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    initReportForm();
});
</script>
{% endblock %}
